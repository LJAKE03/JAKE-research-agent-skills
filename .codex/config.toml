# Project-scoped research routing for the ChatGPT Windows desktop app and Codex.
# The user does not need to select the strategic model or enable multi-agent tools.
model = "gpt-5.6-sol"
model_reasoning_effort = "xhigh"

[features]
multi_agent = true

# The root task can spawn at most two independent workers; workers cannot
# recursively fan out because max_depth is one.
[agents]
max_threads = 2
max_depth = 1

# Register project roles explicitly so spawn_agent exposes their names and locked
# model settings instead of silently falling back to the default Sol worker.
[agents.research_support]
description = "Read-only Terra worker for bounded search, verification, scanning, extraction, evidence tables, and provenance checks."
config_file = "agents/research-support.toml"
nickname_candidates = ["Evidence", "Survey", "Verifier"]

[agents.research_output]
description = "Read-only Luna worker for prose, language, and formatting from a complete locked research writing package."
config_file = "agents/research-output.toml"
nickname_candidates = ["Writer", "Editor", "Formatter"]
